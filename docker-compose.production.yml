# =============================================================================
# TestTrack Pro - Docker Compose (Production)
# =============================================================================
# Production-ready configuration with optimized builds and security
# Usage: docker-compose -f docker-compose.production.yml up -d

version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: testtrack-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-testtrack}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Database password must be set}
      POSTGRES_DB: ${DB_NAME:-testtrack_prod}
      # Performance tuning
      POSTGRES_SHARED_BUFFERS: 256MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 1GB
      POSTGRES_WORK_MEM: 16MB
      POSTGRES_MAINTENANCE_WORK_MEM: 128MB
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./backups:/backups
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=128MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=16MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-testtrack}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - testtrack-network-prod
    # Expose only to internal network (comment out ports for production)
    # ports:
    #   - "5432:5432"

  # Redis Cache & Pub/Sub
  redis:
    image: redis:7-alpine
    container_name: testtrack-redis-prod
    restart: always
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:?Redis password must be set}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - testtrack-network-prod
    # Expose only to internal network (comment out ports for production)
    # ports:
    #   - "6379:6379"

  # API Backend (Production build)
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
      args:
        NODE_ENV: production
    container_name: testtrack-api-prod
    restart: always
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-testtrack}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-testtrack_prod}?connection_limit=10&pool_timeout=20
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT secret must be set}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:?Refresh token secret must be set}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      FRONTEND_URL: ${FRONTEND_URL}
      WEBHOOK_BASE_URL: ${WEBHOOK_BASE_URL}
      SENTRY_DSN: ${SENTRY_DSN}
      FORCE_HTTPS: ${FORCE_HTTPS:-true}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-false}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - testtrack-network-prod
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Web Frontend (Production build with Nginx)
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_WS_URL: ${VITE_WS_URL}
        VITE_APP_NAME: ${VITE_APP_NAME:-TestTrack Pro}
        VITE_APP_VERSION: ${VITE_APP_VERSION:-0.6.2}
    container_name: testtrack-web-prod
    restart: always
    ports:
      - "${WEB_PORT:-80}:80"
    environment:
      VITE_API_URL: ${VITE_API_URL}
      VITE_WS_URL: ${VITE_WS_URL}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - testtrack-network-prod
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # Nginx Reverse Proxy (Optional - for SSL termination and load balancing)
  nginx:
    image: nginx:alpine
    container_name: testtrack-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - web
      - api
    networks:
      - testtrack-network-prod
    # Uncomment to enable
    # profiles:
    #   - with-nginx

volumes:
  postgres_data_prod:
    driver: local
  redis_data_prod:
    driver: local

networks:
  testtrack-network-prod:
    driver: bridge

# =============================================================================
# PRODUCTION DEPLOYMENT CHECKLIST
# =============================================================================
# 1. Create .env.production file with all required secrets
# 2. Set strong passwords for DB_PASSWORD and REDIS_PASSWORD
# 3. Generate JWT_SECRET and REFRESH_TOKEN_SECRET (min 32 chars each)
# 4. Configure Cloudinary credentials
# 5. Configure Resend API key and verified sender email
# 6. Set FRONTEND_URL and WEBHOOK_BASE_URL to production domains
# 7. Set FORCE_HTTPS=true
# 8. Configure OAuth credentials (Google, GitHub)
# 9. Set SENTRY_DSN for error tracking
# 10. Run database migrations: docker-compose exec api pnpm exec prisma migrate deploy
# 11. Set up SSL certificates (Let's Encrypt recommended)
# 12. Configure automated backups for postgres_data_prod volume
# 13. Set up monitoring and alerting (Sentry, Datadog, etc.)
# 14. Test health checks: curl http://localhost:3001/health
# 15. Configure log rotation for nginx logs
# =============================================================================
