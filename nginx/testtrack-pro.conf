# Nginx Reverse Proxy Configuration for TestTrack Pro
# Production deployment setup
# 
# This configuration:
# - Routes /api/* to backend (Fastify on port 3001)
# - Routes / to frontend (static React app)
# - Handles HTTPS/SSL
# - Implements security headers
# - Enables caching for static assets
# - Provides gzip compression

# ============================================
# Upstream Servers (Backend & Frontend)
# ============================================

upstream api_backend {
    # Fastify API server
    server localhost:3001;
    # For multiple backend instances (load balancing):
    # server backend1.example.com:3001;
    # server backend2.example.com:3001;
    # server backend3.example.com:3001;
}

upstream frontend_app {
    # React static app (Vite build output)
    server localhost:5173;
    # Or if using a separate static server:
    # server frontend.example.com:5173;
}

# ============================================
# Rate Limiting Zones
# ============================================

# Limit API endpoints to prevent abuse
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

# ============================================
# HTTP to HTTPS Redirect
# ============================================

server {
    listen 80;
    server_name _;
    
    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

# ============================================
# Main HTTPS Server
# ============================================

server {
    listen 443 ssl http2;
    server_name testtrack-pro.yourdomain.com;

    # SSL Certificate Configuration
    # Generate with Let's Encrypt: certbot certonly --nginx -d testtrack-pro.yourdomain.com
    ssl_certificate /etc/letsencrypt/live/testtrack-pro.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/testtrack-pro.yourdomain.com/privkey.pem;
    
    # SSL Configuration (Modern - TLS 1.2+)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS - Force HTTPS for 1 year
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none';" always;

    # Logging
    access_log /var/log/nginx/testtrack-pro-access.log combined;
    error_log /var/log/nginx/testtrack-pro-error.log warn;

    # =========================================
    # API Routes (/api/*)
    # =========================================
    
    location /api/ {
        # Rate limiting
        limit_req zone=api_limit burst=20 nodelay;
        
        # Authentication endpoints have stricter rate limiting
        location /api/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;
        }
        
        # WebSocket support for Socket.IO
        location /api/socket.io {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }
        
        # Default API route handling
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        
        # Buffering configuration
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # =========================================
    # Root Route (Frontend)
    # =========================================
    
    location / {
        # Serve React SPA
        root /var/www/testtrack-pro/dist;
        
        # Try files, fallback to index.html for SPA routing
        try_files $uri $uri/ /index.html;
        
        # Cache control for HTML (no cache)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }
    }

    # =========================================
    # Health Checks
    # =========================================
    
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    location /api/health {
        access_log off;
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # =========================================
    # API Documentation
    # =========================================
    
    location /api/docs {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================================
    # Deny sensitive paths
    # =========================================
    
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # =========================================
    # Compression
    # =========================================
    
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # =========================================
    # Error Pages
    # =========================================
    
    error_page 404 =200 /index.html;
}

# ============================================
# Additional Upstream Configuration for Scaling
# ============================================
# Uncomment and configure for multiple backend instances

# upstream api_backend_weighted {
#     least_conn;
#     server backend1.example.com:3001 weight=5;
#     server backend2.example.com:3001 weight=5;
#     server backend3.example.com:3001 weight=5;
#     keepalive 32;
# }

# ============================================
# Load Balancing Strategy Notes
# ============================================
# 1. least_conn - Least connections (best for long-lived connections)
# 2. ip_hash - Same IP always goes to same server (sticky sessions, but not ideal)
# 3. least_time - Least response time (requires nginx plus)
# 4. round_robin - Default, serves requests equally
# 5. random - Random selection

# For WebSocket connections, use least_conn or round_robin
# For API with persistent sessions, consider ip_hash or session affinity