name: Deploy Staging (Railway API)

on:
  push:
    branches: ['develop']

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testtrack_test
      JWT_SECRET: test-jwt-secret-key-32chars-minimum
      NODE_ENV: test
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testtrack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres" 
          --health-interval=10s 
          --health-timeout=5s 
          --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Migrate database
        run: pnpm --filter api prisma migrate deploy

      - name: Skip tests in deploy workflow
        run: echo "Skipping test suite in deploy workflow (covered by CI)"

      - name: Build
        run: pnpm build

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway (staging)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service api --detach

      - name: Staging health check
        run: curl -f ${{ secrets.STAGING_API_URL }}/api/health
